<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#dbe6ef" />
    <title>Armani</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600&family=Syne:wght@500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main>
      <header><span class="mark">A</span><span>ARMANI / VOICE</span></header>
      <section aria-labelledby="title">
        <p class="eyebrow" id="state">Ready when you are</p>
        <h1 id="title">Ask the web.<br />Out loud.</h1>
        <button id="mic" type="button" aria-label="Start talking">
          <span class="rings" aria-hidden="true"></span>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 15.2a3.7 3.7 0 0 0 3.7-3.7V5.7a3.7 3.7 0 1 0-7.4 0v5.8a3.7 3.7 0 0 0 3.7 3.7Zm6.2-3.7a6.2 6.2 0 0 1-12.4 0H4a8 8 0 0 0 7 7.9V22h2v-2.6a8 8 0 0 0 7-7.9h-1.8Z"/></svg>
        </button>
        <p class="hint" id="hint">Tap once, then speak naturally.</p>
      </section>
      <footer><span>VOICE ONLY</span><span>LIVE WEB ACCESS</span></footer>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
